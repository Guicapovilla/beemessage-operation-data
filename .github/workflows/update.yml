name: Atualizar dashboard

on:
  schedule:
    # 07:00 America/Sao_Paulo (BRT = UTC−3) → 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # Sprint (Project v2): SPRINT_FIELD_NAME_GITHUB_PRODUCT, SPRINT_CURRENT_GITHUB_PRODUCT, SPRINT_PREVIOUS_GITHUB_PRODUCT
      # Modo A (Project v2): LABEL_GITHUB_PRODUCT é ignorado (board inteiro). Modo B: label filtra issues no repo.
      # SPRINT_AUTO_GITHUB_PRODUCT=0 desliga detecção automática de sprint.
      # Secrets não podem começar com GITHUB_; use nomes *_GITHUB_PRODUCT em Settings → Secrets.
      # OKR via módulo Plane: PLANE_OKR_WORKSPACE / PLANE_OKR_PROJECT_ID / PLANE_OKR_MODULE_ID.
      - name: Gerar dados
        env:
          PLANE_API_TOKEN: ${{ secrets.PLANE_API_TOKEN }}
          PLANE_API_KEY: ${{ secrets.PLANE_API_TOKEN }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          PLANE_PROJECT_IDS: ${{ secrets.PLANE_PROJECT_IDS }}
          PLANE_OKR_WORKSPACE: ${{ secrets.PLANE_OKR_WORKSPACE }}
          PLANE_OKR_PROJECT_ID: ${{ secrets.PLANE_OKR_PROJECT_ID }}
          PLANE_OKR_MODULE_ID: ${{ secrets.PLANE_OKR_MODULE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          ANTHROPIC_MAX_TOKENS: ${{ secrets.ANTHROPIC_MAX_TOKENS }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TOKEN_GITHUB_PRODUCT: ${{ secrets.TOKEN_GITHUB_PRODUCT }}
          OWNER_GITHUB_PRODUCT: ${{ secrets.OWNER_GITHUB_PRODUCT }}
          REPO_GITHUB_PRODUCT: ${{ secrets.REPO_GITHUB_PRODUCT }}
          PROJECT_NUMBER_GITHUB_PRODUCT: ${{ secrets.PROJECT_NUMBER_GITHUB_PRODUCT }}
          OWNER_TYPE_GITHUB_PRODUCT: ${{ secrets.OWNER_TYPE_GITHUB_PRODUCT }}
          LABEL_GITHUB_PRODUCT: ${{ secrets.LABEL_GITHUB_PRODUCT }}
          STATUS_PLANNED_GITHUB_PRODUCT: ${{ secrets.STATUS_PLANNED_GITHUB_PRODUCT }}
          STATUS_IN_PROGRESS_GITHUB_PRODUCT: ${{ secrets.STATUS_IN_PROGRESS_GITHUB_PRODUCT }}
          STATUS_DONE_GITHUB_PRODUCT: ${{ secrets.STATUS_DONE_GITHUB_PRODUCT }}
          PRIORITY_URGENTE_GITHUB_PRODUCT: ${{ secrets.PRIORITY_URGENTE_GITHUB_PRODUCT }}
          PRIORITY_ALTA_GITHUB_PRODUCT: ${{ secrets.PRIORITY_ALTA_GITHUB_PRODUCT }}
          PRIORITY_MEDIA_GITHUB_PRODUCT: ${{ secrets.PRIORITY_MEDIA_GITHUB_PRODUCT }}
          PRIORITY_BAIXA_GITHUB_PRODUCT: ${{ secrets.PRIORITY_BAIXA_GITHUB_PRODUCT }}
          SPRINT_FIELD_NAME_GITHUB_PRODUCT: ${{ secrets.SPRINT_FIELD_NAME_GITHUB_PRODUCT }}
          SPRINT_CURRENT_GITHUB_PRODUCT: ${{ secrets.SPRINT_CURRENT_GITHUB_PRODUCT }}
          SPRINT_PREVIOUS_GITHUB_PRODUCT: ${{ secrets.SPRINT_PREVIOUS_GITHUB_PRODUCT }}
          SPRINT_AUTO_GITHUB_PRODUCT: ${{ secrets.SPRINT_AUTO_GITHUB_PRODUCT }}
        run: python -u scripts/fetch_metrics.py
