name: OKR Collector — Stripe diário

on:
  schedule:
    # Roda todo dia às 08:00 horário de Brasília (11:00 UTC)
    - cron: '0 11 * * *'
  # Permite rodar manualmente pela interface do GitHub Actions
  workflow_dispatch:

jobs:
  coletar-okr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar okr_collector.py
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          # Aponta para o latest.json da semana atual
          # Ajuste o caminho se o seu arquivo estiver em outro lugar
          LATEST_JSON_PATH: data/latest.json
        run: python okr_collector.py

      - name: Commit e push se houve mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          # Só commita se houver diferença real no arquivo
          git diff --cached --quiet || git commit -m "chore: atualiza OKRs [$(date +'%Y-%m-%d')]"
          git push
