<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Operações</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #222637;
    --border:   rgba(255,255,255,.08);
    --border2:  rgba(255,255,255,.14);
    --text:     #e8eaf0;
    --muted:    #7b8099;
    --hint:     #4a4f6a;
    --green:    #3ecf8e;
    --green-bg: rgba(62,207,142,.1);
    --amber:    #f5a623;
    --amber-bg: rgba(245,166,35,.1);
    --red:      #f56565;
    --red-bg:   rgba(245,101,101,.1);
    --blue:     #60a5fa;
    --blue-bg:  rgba(96,165,250,.1);
    --radius:   10px;
    --radius-lg:14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  .shell { max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }

  /* Header */
  .hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  .hdr-left h1 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
  .hdr-left p  { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .hdr-right   { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .status-pill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; letter-spacing: .04em; }
  .pill-pos  { background: var(--green-bg); color: var(--green); }
  .pill-neu  { background: var(--amber-bg); color: var(--amber); }
  .pill-neg  { background: var(--red-bg);   color: var(--red); }
  .updated   { font-size: 11px; color: var(--hint); }

  /* KPI strip */
  .kpis { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 28px; }
  .kpi  { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -.5px; }
  .kpi-delta { font-size: 11px; margin-top: 5px; display: flex; align-items: center; gap: 5px; }
  .up   { color: var(--green); }
  .down { color: var(--red); }
  .flat { color: var(--muted); }
  .kv-green { color: var(--green); }
  .kv-amber { color: var(--amber); }
  .kv-red   { color: var(--red); }
  .kv-white { color: var(--text); }

  /* Section titles */
  .sec { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--hint); font-weight: 600; margin: 28px 0 12px; }

  /* Areas table */
  .tbl-wrap { background: var(--surface); border: .5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; }
  thead td { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); padding: 10px 14px; border-bottom: .5px solid var(--border); background: var(--surface2); }
  tbody tr { border-bottom: .5px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 11px 14px; color: var(--text); }
  td.dim { color: var(--muted); }

  /* Score pills */
  .sp { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .sp-a { background:rgba(62,207,142,.12); color:#3ecf8e; }
  .sp-b { background:rgba(245,166,35,.12);  color:#f5a623; }
  .sp-c { background:rgba(251,146,60,.12);  color:#fb923c; }
  .sp-d { background:rgba(245,101,101,.12); color:#f56565; }
  .sp-dot { width:5px; height:5px; border-radius:50%; }
  .dot-a{background:#3ecf8e} .dot-b{background:#f5a623} .dot-c{background:#fb923c} .dot-d{background:#f56565}
  .score-arrow { font-size:10px; margin-left:3px; }

  /* Bar */
  .bar-wrap { display:flex; align-items:center; gap:6px; }
  .bar-bg   { flex:1; height:3px; background:var(--surface2); border-radius:2px; min-width:40px; }
  .bar-fill { height:3px; border-radius:2px; }

  /* Grid 2 cols */
  .grid2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }

  /* Collab cards */
  .cc { background:var(--surface); border:.5px solid var(--border); border-radius:var(--radius-lg); padding:16px; }
  .cc.critical { border-color:rgba(245,101,101,.4); background:rgba(245,101,101,.05); }
  .cc.warn     { border-color:rgba(245,166,35,.3);  background:rgba(245,166,35,.04); }
  .cc-top  { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .cc-name { font-size:13px; font-weight:500; }
  .cc-area { font-size:11px; color:var(--muted); margin-top:2px; }
  .badge   { font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; white-space:nowrap; }
  .bd-crit { background:var(--red-bg);   color:var(--red); }
  .bd-warn { background:var(--amber-bg); color:var(--amber); }
  .bd-ok   { background:var(--green-bg); color:var(--green); }
  .bd-over { background:var(--blue-bg);  color:var(--blue); }
  .cc-row  { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-top:6px; }
  .cc-row strong { font-weight:500; }
  .overdue-mini { font-size:11px; color:var(--red); margin-top:8px; border-top:.5px solid var(--border); padding-top:8px; }
  .overdue-mini-item { display:flex; justify-content:space-between; gap:8px; margin-top:4px; }
  .omi-title { color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .omi-days  { color:var(--red); font-weight:600; flex-shrink:0; }
  .omi-days.warn { color:var(--amber); }

  /* Overdue table */
  .tag { font-size:10px; font-weight:600; padding:2px 6px; border-radius:10px; }
  .tag-new  { background:var(--red-bg);   color:var(--red); }
  .tag-rec  { background:var(--amber-bg); color:var(--amber); }
  .days-red  { color:var(--red);   font-weight:600; }
  .days-amb  { color:var(--amber); font-weight:600; }

  /* Insights panel */
  .insights-wrap { background:var(--surface); border:.5px solid var(--border); border-radius:var(--radius-lg); padding:22px 24px; margin-bottom:12px; }
  .ins-headline  { font-size:16px; font-weight:600; margin-bottom:12px; line-height:1.4; }
  .ins-summary   { font-size:13px; color:#bbc0d0; line-height:1.7; margin-bottom:18px; }
  .ins-cols { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px; margin-bottom:18px; }
  .ins-block h3  { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--hint); font-weight:600; margin-bottom:10px; }
  .ins-list  { list-style:none; }
  .ins-list li { font-size:12px; color:#bbc0d0; line-height:1.6; padding:4px 0 4px 14px; position:relative; border-bottom:.5px solid var(--border); }
  .ins-list li:last-child { border-bottom:none; }
  .ins-list li::before { content:''; position:absolute; left:0; top:12px; width:5px; height:5px; border-radius:50%; background:var(--hint); }
  .ins-list.green li::before { background:var(--green); }
  .ins-list.red   li::before { background:var(--red); }
  .ins-list.amber li::before { background:var(--amber); }
  .ins-list.blue  li::before { background:var(--blue); }
  .ins-overload { background:rgba(96,165,250,.07); border:.5px solid rgba(96,165,250,.2); border-radius:var(--radius); padding:14px 16px; margin-bottom:18px; }
  .ins-overload h3 { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--blue); font-weight:600; margin-bottom:6px; }
  .ins-overload p  { font-size:12px; color:#bbc0d0; line-height:1.7; }
  .ins-actions { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
  .action-card { background:var(--surface2); border-radius:var(--radius); padding:12px 14px; display:flex; gap:10px; align-items:flex-start; }
  .action-num  { width:20px; height:20px; border-radius:50%; background:rgba(96,165,250,.15); color:var(--blue); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .action-text { font-size:12px; color:#bbc0d0; line-height:1.6; }

  /* Chart */
  .chart-card { background:var(--surface); border:.5px solid var(--border); border-radius:var(--radius-lg); padding:20px; margin-bottom:12px; }
  .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .chart-title  { font-size:12px; font-weight:500; color:var(--muted); }
  .chart-legend { display:flex; gap:14px; }
  .cl-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
  .cl-dot  { width:8px; height:8px; border-radius:2px; }

  /* Responsive */
  @media(max-width:700px) {
    .kpis      { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .grid2     { grid-template-columns:1fr; }
    .ins-cols  { grid-template-columns:1fr; }
    .ins-actions { grid-template-columns:1fr; }
  }
  @media(max-width:480px) {
    .kpis { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>
<div class="shell">
  <div id="app"><p style="color:var(--muted);padding:40px 0">Carregando dashboard…</p></div>
</div>

<script>
const scoreOrder = {A:4,B:3,C:2,D:1};

function scorePill(s) {
  return `<span class="sp sp-${s.toLowerCase()}"><span class="sp-dot dot-${s.toLowerCase()}"></span>${s}</span>`;
}
function scoreDelta(s0,s1) {
  const d = scoreOrder[s1] - scoreOrder[s0];
  if(d>0) return `<span class="score-arrow up">↑</span>`;
  if(d<0) return `<span class="score-arrow down">↓</span>`;
  return `<span class="score-arrow flat">—</span>`;
}
function delta(cur,prev,invert=false) {
  const d = cur-prev;
  if(d===0) return `<span class="flat">sem alteração</span>`;
  const good = invert ? d<0 : d>0;
  const cls  = good ? 'up' : 'down';
  const sign = d>0?'+':'';
  return `<span class="${cls}">${sign}${d}</span>`;
}
function deltaF(cur,prev,invert=false) {
  if(cur==null||prev==null) return `<span class="flat">—</span>`;
  const d = cur-prev;
  if(Math.abs(d)<0.05) return `<span class="flat">sem alteração</span>`;
  const good = invert?d<0:d>0;
  const cls  = good?'up':'down';
  const sign = d>0?'+':'';
  return `<span class="${cls}">${sign}${d.toFixed(1)}d</span>`;
}
function bar(pct, color='#3ecf8e') {
  const p = Math.min(100,Math.max(0,pct));
  return `<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${p}%;background:${color}"></div></div></div>`;
}
function fmtDt(iso) {
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function render(data) {
  const C = data.current, P = data.previous, ins = data.insights;

  // Status pill
  const pillCls = {positivo:'pill-pos', neutro:'pill-neu', negativo:'pill-neg'}[ins.status]||'pill-neu';
  const pillLbl = {positivo:'Semana positiva', neutro:'Semana neutra', negativo:'Atenção requerida'}[ins.status]||'—';

  // KPIs
  const kpiHtml = `
    <div class="kpi">
      <div class="kpi-label">Taxa de conclusão</div>
      <div class="kpi-value ${C.rate>=85?'kv-green':C.rate>=70?'kv-amber':'kv-red'}">${C.rate}%</div>
      <div class="kpi-delta">${delta(C.rate,P.rate)} <span class="flat">vs sem. ant. (${P.rate}%)</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Cycle time médio</div>
      <div class="kpi-value ${C.avg_cycle_time<=7?'kv-green':C.avg_cycle_time<=12?'kv-amber':'kv-red'}">${C.avg_cycle_time??'—'}d</div>
      <div class="kpi-delta">${deltaF(C.avg_cycle_time,P.avg_cycle_time,true)} <span class="flat">vs sem. ant. (${P.avg_cycle_time??'—'}d)</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Em atraso agora</div>
      <div class="kpi-value ${C.overdue===0?'kv-green':C.overdue<=3?'kv-amber':'kv-red'}">${C.overdue}</div>
      <div class="kpi-delta">${delta(C.overdue,P.overdue,true)} <span class="flat">vs sem. ant. (${P.overdue})</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Rollover crônico</div>
      <div class="kpi-value ${C.chronic_rollover===0?'kv-green':C.chronic_rollover<=1?'kv-amber':'kv-red'}">${C.chronic_rollover}</div>
      <div class="kpi-delta">${delta(C.chronic_rollover,P.chronic_rollover,true)} <span class="flat">vs sem. ant. (${P.chronic_rollover})</span></div>
    </div>`;

  // Areas table
  const prevAreaMap = {};
  (P.areas||[]).forEach(a => { prevAreaMap[a.name] = a; });

  const areasRows = C.areas.map(a => {
    const pa = prevAreaMap[a.name]||{};
    const ds = pa.score ? scoreDelta(pa.score, a.score) : '';
    const ctColor = a.cycle_time>12?'#f56565':a.cycle_time>7?'#f5a623':'#3ecf8e';
    const barColor = a.score==='A'?'#3ecf8e':a.score==='B'?'#f5a623':a.score==='C'?'#fb923c':'#f56565';
    const rDelta = pa.rate!=null ? ` <span style="font-size:10px;color:${a.rate>pa.rate?'#3ecf8e':a.rate<pa.rate?'#f56565':'#4a4f6a'}">(${a.rate>pa.rate?'+':''}${a.rate-pa.rate}pp)</span>` : '';
    const odTxt = a.overdue===0
      ? `<span class="up">0</span>`
      : `<span class="${a.overdue>1?'down':'days-amb'}">${a.overdue}</span>`;
    return `<tr>
      <td>${a.name}</td>
      <td>${scorePill(a.score)}${ds}</td>
      <td class="dim">${a.rate}%${rDelta}<br><div style="margin-top:4px">${bar(a.rate,barColor)}</div></td>
      <td>${odTxt}</td>
      <td class="dim" style="color:${a.cycle_time?ctColor:'var(--hint)'}">${a.cycle_time?a.cycle_time+'d':'—'}</td>
      <td class="dim">${a.backlog}</td>
    </tr>`;
  }).join('');

  // Collaborators
  const collabCards = C.collaborators.map(c => {
    const sev = c.severity;
    const cardCls = sev==='critical'?'cc critical':sev==='warn'?'cc warn':'cc';
    const bdCls   = sev==='critical'?'bd-crit':sev==='warn'?'bd-warn':'bd-ok';
    const bdLbl   = sev==='critical'?'crônico':sev==='warn'?'atenção':'ok';
    const overBadge = c.overloaded ? `<span class="badge bd-over" style="margin-left:4px">sobrecarga</span>` : '';
    const overdueHtml = c.overdue.length ? `
      <div class="overdue-mini">
        ${c.overdue.slice(0,2).map(o => `
          <div class="overdue-mini-item">
            <span class="omi-title">${o.title}</span>
            <span class="omi-days ${o.days<14?'warn':''}">${o.days}d</span>
          </div>`).join('')}
        ${c.overdue.length>2?`<div style="font-size:10px;color:var(--hint);margin-top:4px">+${c.overdue.length-2} mais</div>`:''}
      </div>` : '';
    return `
      <div class="${cardCls}">
        <div class="cc-top">
          <div>
            <div class="cc-name">${c.name}</div>
            <div class="cc-area">${c.areas.join(', ')}</div>
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
            <span class="badge ${bdCls}">${bdLbl}</span>${overBadge}
          </div>
        </div>
        <div class="cc-row"><span>Tasks abertas</span><strong style="color:${c.overloaded?'var(--blue)':'var(--text)'}">${c.tasks - c.done}</strong></div>
        <div class="cc-row"><span>Taxa de conclusão</span><strong style="color:${c.rate>=80?'var(--green)':c.rate>=60?'var(--amber)':'var(--red)'}">${c.rate}%</strong></div>
        <div class="cc-row"><span>Atrasos</span><strong style="color:${c.overdue.length>0?'var(--red)':'var(--green)'}">${c.overdue.length}</strong></div>
        ${overdueHtml}
      </div>`;
  }).join('');

  // Overdue table
  const overdueRows = (C.overdue_tasks||[]).map((t,i) => {
    const isNew = i >= (P.overdue||0); // rough heuristic — real data flags this
    const tag = t.days >= 14 ? `<span class="tag tag-new">crônico</span>` : `<span class="tag tag-rec">atenção</span>`;
    const daysCls = t.days>=14?'days-red':'days-amb';
    return `<tr>
      <td class="dim">${t.area}</td>
      <td>${t.title}</td>
      <td>${tag}</td>
      <td class="${daysCls}" style="text-align:right">${t.days}d</td>
      <td class="dim" style="text-align:right">${(t.assignees||[]).join(', ')}</td>
    </tr>`;
  }).join('');

  // Insights HTML
  const highlightItems = (ins.highlights||[]).map(h=>`<li>${h}</li>`).join('');
  const alertItems     = (ins.alerts||[]).map(a=>`<li>${a}</li>`).join('');
  const projItems      = (ins.projections||[]).map(p=>`<li>${p}</li>`).join('');
  const actionCards    = (ins.action_items||[]).map((a,i)=>`
    <div class="action-card">
      <div class="action-num">${i+1}</div>
      <div class="action-text">${a}</div>
    </div>`).join('');

  // Build full HTML
  document.getElementById('app').innerHTML = `
    <div class="hdr">
      <div class="hdr-left">
        <h1>Dashboard Operações</h1>
        <p>${data.week_label}</p>
      </div>
      <div class="hdr-right">
        <span class="status-pill ${pillCls}">${pillLbl}</span>
        <span class="updated">Atualizado ${fmtDt(data.generated_at)}</span>
      </div>
    </div>

    <div class="kpis">${kpiHtml}</div>

    <div class="sec">Tendência — últimas semanas</div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Taxa de conclusão & tasks em atraso</span>
        <div class="chart-legend">
          <div class="cl-item"><div class="cl-dot" style="background:#3ecf8e"></div>Taxa %</div>
          <div class="cl-item"><div class="cl-dot" style="background:#f56565"></div>Em atraso</div>
        </div>
      </div>
      <div style="position:relative;height:180px"><canvas id="trendChart" role="img" aria-label="Gráfico de tendência semanal de taxa de conclusão e tasks em atraso">Tendência semanal de operações.</canvas></div>
    </div>

    <div class="sec">Saúde por área</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <td>Área</td><td>Score</td><td>Taxa</td><td>Atrasos</td><td>C.Time</td><td>Backlog</td>
        </tr></thead>
        <tbody>${areasRows}</tbody>
      </table>
    </div>

    <div class="sec">Colaboradores — carga e atrasos</div>
    <div class="grid2">${collabCards}</div>

    <div class="sec">Tasks em atraso — detalhe</div>
    <div class="tbl-wrap" style="margin-bottom:28px">
      <table>
        <thead><tr>
          <td>Área</td><td>Task</td><td>Status</td><td style="text-align:right">Dias</td><td style="text-align:right">Responsável</td>
        </tr></thead>
        <tbody>${overdueRows}</tbody>
      </table>
    </div>

    <div class="sec">Insights & análise da semana</div>
    <div class="insights-wrap">
      <div class="ins-headline">${ins.headline}</div>
      <div class="ins-summary">${ins.summary}</div>

      <div class="ins-cols">
        <div class="ins-block">
          <h3>Destaques positivos</h3>
          <ul class="ins-list green">${highlightItems}</ul>
        </div>
        <div class="ins-block">
          <h3>Alertas e riscos</h3>
          <ul class="ins-list red">${alertItems}</ul>
        </div>
      </div>

      <div class="ins-overload">
        <h3>Análise de carga do time</h3>
        <p>${ins.overload_analysis}</p>
      </div>

      <div class="ins-block" style="margin-bottom:16px">
        <h3>Projeções para próxima semana</h3>
        <ul class="ins-list amber">${projItems}</ul>
      </div>

      <div class="ins-block" style="margin-bottom:14px">
        <h3>Ações prioritárias — COO</h3>
      </div>
      <div class="ins-actions">${actionCards}</div>
    </div>
  `;

  // Render trend chart
  const trend = data.trend || [];
  new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: trend.map(t => t.week),
      datasets: [
        {
          label: 'Taxa %',
          data: trend.map(t => t.rate),
          borderColor: '#3ecf8e',
          backgroundColor: 'rgba(62,207,142,.08)',
          tension: .35,
          pointRadius: 4,
          pointBackgroundColor: '#3ecf8e',
          fill: true,
          yAxisID: 'y',
        },
        {
          label: 'Em atraso',
          data: trend.map(t => t.overdue),
          borderColor: '#f56565',
          backgroundColor: 'transparent',
          tension: .35,
          pointRadius: 4,
          pointBackgroundColor: '#f56565',
          borderDash: [4,3],
          yAxisID: 'y2',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: { legend:{ display:false } },
      scales: {
        x: { grid:{ color:'rgba(255,255,255,.05)' }, ticks:{ color:'#7b8099', font:{size:11} } },
        y: {
          position:'left',
          min:0, max:100,
          grid:{ color:'rgba(255,255,255,.05)' },
          ticks:{ color:'#3ecf8e', font:{size:11}, callback: v => v+'%' }
        },
        y2: {
          position:'right',
          min:0,
          grid:{ display:false },
          ticks:{ color:'#f56565', font:{size:11} }
        }
      }
    }
  });
}

// Load data
fetch('data/latest.json?v=' + Date.now())
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e => {
    document.getElementById('app').innerHTML =
      `<p style="color:#f56565;padding:40px 0">Erro ao carregar dados: ${e.message}<br>
       <span style="color:#4a4f6a;font-size:12px">Verifique se data/latest.json existe no repositório.</span></p>`;
  });
</script>
</body>
</html>
